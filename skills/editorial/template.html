<!doctype html>
<html lang="en" class="palette-coral">
<head>
  <meta charset="utf-8">
  <title>Untitled Document</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Compose freely from components.html. Below is the smallest useful doc:
       a cover + one section + a colophon. Add cards / quotes / contents / more
       sections / prose blocks as needed. -->

  <header class="cover">
    <p class="eyebrow">Eyebrow</p>
    <h1 class="title">Document title <em>here.</em></h1>
    <p class="lede">Short lede sentence that sets the stakes or invites the reader in.</p>
  </header>

  <section class="chunk">
    <div class="section-head">
      <div class="section-num">01</div>
      <div class="section-title-block">
        <h2>First section</h2>
        <p class="section-sub">Optional subtitle in sans.</p>
      </div>
    </div>
    <p class="body">Write your content here. Use <span class="accent">italic accents</span> for key terms.</p>
  </section>

  <footer class="colophon">
    <span class="signature"><span class="dot"></span><span>Document name</span></span>
    <span class="right">A short footer line</span>
  </footer>

</body>
</html>
